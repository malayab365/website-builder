<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — Website Builder Studio</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="/css/app.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="brand-logo"><span class="mark">W</span> Builder Studio</div>
    <h1>Create your account</h1>
    <p class="subtitle">Free to start. Pay only when you download a finished site.</p>

    <div class="form-error" id="formError"></div>

    <form id="signupForm">
      <div class="form-field">
        <label for="name">Name</label>
        <input type="text" id="name" required autocomplete="name" placeholder="Jane Doe">
      </div>
      <div class="form-field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
      </div>
      <div class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="new-password" placeholder="At least 6 characters">
      </div>
      <button class="btn btn-primary btn-block" type="submit">Create account</button>
    </form>

    <p class="switch-link">Already have an account? <a href="/login.html">Log in</a></p>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
